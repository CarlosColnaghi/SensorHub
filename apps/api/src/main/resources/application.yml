spring:
  application:
    name: sensorhub-api
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/sensorhub}
    username: ${SPRING_DATASOURCE_USERNAME:sensorhub}
    password: ${SPRING_DATASOURCE_PASSWORD:sensorhub}
  flyway:
    enabled: true
    locations: classpath:db/migration
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        jdbc:
          time_zone: UTC

server:
  port: ${SERVER_PORT:8080}
