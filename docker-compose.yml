services:
  postgres:
    image: postgres:17
    container_name: sensorhub-postgres
    environment:
      POSTGRES_DB: sensorhub
      POSTGRES_USER: sensorhub
      POSTGRES_PASSWORD: sensorhub
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sensorhub -d sensorhub"]
      interval: 10s
      timeout: 5s
      retries: 5

  mqtt:
    image: eclipse-mosquitto:2.0
    container_name: sensorhub-mqtt
    entrypoint: ["mosquitto"]
    command: ["-c", "/mosquitto/config/mosquitto.conf"]
    ports:
      - "1883:1883"
      - "9001:9001"
    volumes:
      - ./infra/mosquitto/mosquitto.conf:/mosquitto/config/mosquitto.conf:ro,Z

  mqtt-ui:
    image: emqx/mqttx-web:latest
    container_name: sensorhub-mqtt-ui
    ports:
      - "8081:80"
    depends_on:
      mqtt:
        condition: service_started

  api:
    build:
      context: ./apps/api
    container_name: sensorhub-api
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/sensorhub
      SPRING_DATASOURCE_USERNAME: sensorhub
      SPRING_DATASOURCE_PASSWORD: sensorhub
      SERVER_PORT: 8080
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy

  mock-sensor:
    build:
      context: ./apps/mock-sensor
    container_name: sensorhub-mock-sensor
    restart: on-failure
    environment:
      SENSORHUB_MQTT_HOST: mqtt
      SENSORHUB_MQTT_PORT: 1883
      SENSORHUB_MQTT_TOPIC: sensorhub/measurements
      SENSORHUB_MQTT_CLIENT_ID: sensorhub-mock-sensor
      SENSORHUB_MQTT_QOS: 0
      SENSORHUB_HARDWARE_UUIDS: b0fee3a6-ae91-4265-9365-36f793f32f06,b23e32b4-53fc-4b47-bcf9-42b47f48d9be
      SENSORHUB_MEASUREMENT_INTERVAL_SECONDS: 5
      SENSORHUB_TEMPERATURE_MIN: 18.0
      SENSORHUB_TEMPERATURE_MAX: 32.0
      SENSORHUB_TEMPERATURE_STEP_MAX: 0.4
      SENSORHUB_HUMIDITY_MIN: 35.0
      SENSORHUB_HUMIDITY_MAX: 80.0
      SENSORHUB_HUMIDITY_STEP_MAX: 1.5
    depends_on:
      mqtt:
        condition: service_started

  mqtt-ingestor:
    build:
      context: ./apps/mqtt-ingestor
    container_name: sensorhub-mqtt-ingestor
    restart: on-failure
    environment:
      SENSORHUB_MQTT_HOST: mqtt
      SENSORHUB_MQTT_PORT: 1883
      SENSORHUB_MQTT_TOPIC: sensorhub/measurements
      SENSORHUB_MQTT_CLIENT_ID: sensorhub-mqtt-ingestor
      SENSORHUB_MQTT_QOS: 0
      SENSORHUB_DB_HOST: postgres
      SENSORHUB_DB_PORT: 5432
      SENSORHUB_DB_NAME: sensorhub
      SENSORHUB_DB_USER: sensorhub
      SENSORHUB_DB_PASSWORD: sensorhub
      SENSORHUB_DEVICE_CACHE_TTL_SECONDS: 300
    depends_on:
      postgres:
        condition: service_healthy
      mqtt:
        condition: service_started
      api:
        condition: service_started

volumes:
  postgres_data:
