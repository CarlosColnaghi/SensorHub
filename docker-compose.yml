services:
  postgres:
    image: postgres:17
    container_name: sensorhub-postgres
    environment:
      POSTGRES_DB: sensorhub
      POSTGRES_USER: sensorhub
      POSTGRES_PASSWORD: sensorhub
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sensorhub -d sensorhub"]
      interval: 10s
      timeout: 5s
      retries: 5

  mqtt:
    image: eclipse-mosquitto:2.0
    container_name: sensorhub-mqtt
    ports:
      - "1883:1883"
    volumes:
      - ./infra/mosquitto/mosquitto.conf:/mosquitto/config/mosquitto.conf:ro
      - mqtt_data:/mosquitto/data

  api:
    build:
      context: ./apps/api
    container_name: sensorhub-api
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/sensorhub
      SPRING_DATASOURCE_USERNAME: sensorhub
      SPRING_DATASOURCE_PASSWORD: sensorhub
      SERVER_PORT: 8080
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy

  mock-sensor:
    build:
      context: ./apps/mock-sensor
    container_name: sensorhub-mock-sensor
    restart: on-failure
    environment:
      SENSORHUB_MQTT_HOST: mqtt
      SENSORHUB_MQTT_PORT: 1883
      SENSORHUB_MQTT_TOPIC: sensorhub/telemetry
      SENSORHUB_MQTT_CLIENT_ID: sensorhub-mock-sensor
      SENSORHUB_MQTT_QOS: 0
      SENSORHUB_HARDWARE_UUIDS: b0fee3a6-ae91-4265-9365-36f793f32f06
      SENSORHUB_MEASUREMENT_INTERVAL_SECONDS: 5
      SENSORHUB_TEMPERATURE_MIN: 18.0
      SENSORHUB_TEMPERATURE_MAX: 32.0
      SENSORHUB_TEMPERATURE_STEP_MAX: 0.4
      SENSORHUB_HUMIDITY_MIN: 35.0
      SENSORHUB_HUMIDITY_MAX: 80.0
      SENSORHUB_HUMIDITY_STEP_MAX: 1.5
    depends_on:
      mqtt:
        condition: service_started

  mobile:
    image: ghcr.io/cirruslabs/flutter:stable
    container_name: sensorhub-mobile-check
    working_dir: /workspace/apps/mobile
    profiles:
      - mobile
    environment:
      SENSORHUB_API_BASE_URL: http://api:8080
    volumes:
      - .:/workspace
    command: flutter test

volumes:
  postgres_data:
  mqtt_data:
